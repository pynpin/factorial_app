name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev build-essential \
            libltdl-dev cmake

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform
          yes | buildozer android debug || true
          ANDROID_SDK_ROOT=$(find ~/.buildozer -maxdepth 4 -type d -name "android-sdk" | head -n1)
          if [ -n "$ANDROID_SDK_ROOT" ] && [ -d "$ANDROID_SDK_ROOT/cmdline-tools" ]; then
            CMDLINE_TOOLS=$(find "$ANDROID_SDK_ROOT/cmdline-tools" -maxdepth 2 -type d -name "bin" | head -n1)
            yes | "$CMDLINE_TOOLS/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          fi

      - name: Build APK
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: factorial-apk
          path: bin/*.apk
